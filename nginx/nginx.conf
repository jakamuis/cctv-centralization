# Nginx configuration for CCTV-Centralization reverse proxy
# Proxies requests to frontend, backend, and go2rtc services

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server cctv_frontend:5173;
    }

    upstream backend {
        server cctv_backend:8000;
    }

    upstream go2rtc {
        server cctv_go2rtc:1984;
    }

    server {
        listen 80;

        # Proxy frontend requests
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy backend API requests
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy go2rtc streaming gateway
        location /go2rtc/ {
            proxy_pass http://go2rtc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}