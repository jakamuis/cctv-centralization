worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Increase buffer sizes for WebSocket / streaming proxying
    proxy_buffers         8 16k;
    proxy_buffer_size     32k;

    server {
        listen       80;
        server_name  localhost;

        # ----------------------------------------------------------------
        # Backend API — proxy to FastAPI
        # ----------------------------------------------------------------
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket upgrade support (for /api/v1/ws)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ----------------------------------------------------------------
        # go2rtc — proxy HTTP API + WebSocket streams
        # /go2rtc/  →  http://go2rtc:1984/
        # ----------------------------------------------------------------
        location /go2rtc/ {
            proxy_pass         http://go2rtc:1984/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Critical: WebSocket upgrade for MSE/WebRTC streams
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;

            # Allow large responses (HLS segments)
            proxy_buffering    off;
        }

        # ----------------------------------------------------------------
        # HLS static files (legacy nginx-served HLS)
        # ----------------------------------------------------------------
        location /hls/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /streams;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Credentials true;
        }

        # ----------------------------------------------------------------
        # Frontend — proxy to Vite dev server
        # ----------------------------------------------------------------
        location / {
            proxy_pass         http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Vite HMR WebSocket
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
