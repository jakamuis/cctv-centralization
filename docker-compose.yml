services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: cctv_backend
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cctv_db
      REDIS_URL: redis://redis:6379/0

      JWT_SECRET: supersecretkey
      JWT_ALGORITHM: HS256

      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      # Path to go2rtc config file (shared volume — backend writes, go2rtc auto-reloads)
      GO2RTC_CONFIG_PATH: /go2rtc.yaml
      # go2rtc Docker container name — used to send SIGHUP for config reload
      GO2RTC_CONTAINER_NAME: cctv_go2rtc
      # go2rtc internal host (Docker service name) for backend proxy calls
      STREAMING_GO2RTC_HOST: go2rtc
      # go2rtc internal API URL — backend calls this directly over Docker network
      STREAMING_GO2RTC_API_URL: http://go2rtc:1984
      # go2rtc public URL the browser uses — routed via nginx on port 80
      STREAMING_GO2RTC_PUBLIC_URL: http://localhost:80

    volumes:
      - ./backend:/app
      - ./go2rtc/go2rtc.yaml:/go2rtc.yaml:rw
      - ./go2rtc/scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    depends_on:
      - postgres
      - redis
      - go2rtc

    networks:
      - internal

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: cctv_frontend
    restart: unless-stopped

    ports:
      - "5173:5173"  # Vite dev server — direct access for development

    environment:
      # Relative path — Vite dev server proxies /api/ to the backend container
      VITE_API_BASE_URL: "/api/v1"
      # go2rtc WebSocket/stream URL — routed via nginx /go2rtc/ prefix
      VITE_GO2RTC_BASE_URL: ""
      # go2rtc internal target for Vite dev server proxy (Docker service name)
      VITE_GO2RTC_TARGET: "http://go2rtc:1984"
      # Vite proxy target — Docker service name so the dev server can reach the backend
      VITE_PROXY_TARGET: "http://backend:8000"

    volumes:
      # Mount source for Vite HMR — node_modules stays in the image
      - ./frontend:/app
      - /app/node_modules

    networks:
      - internal

    depends_on:
      - backend

  postgres:
    image: postgres:15

    container_name: cctv_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cctv_db

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      - internal

  redis:
    image: redis:7

    container_name: cctv_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    networks:
      - internal

  go2rtc:
    build:
      context: ./go2rtc
      dockerfile: Dockerfile
    container_name: cctv_go2rtc
    restart: unless-stopped
    environment:
      - GO2RTC_API=true
      - GO2RTC_DEBUG=false
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml:rw
      - ./go2rtc/scripts:/scripts:ro
    ports:
      - "1984:1984" # HTTP API/HLS (direct access for debugging)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1984/" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:latest
    container_name: cctv_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./streams:/streams:rw
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - go2rtc
    networks:
      - internal

  # Optional legacy ffmpeg worker (disabled in favor of go2rtc)
  # stream-worker:
  #   build:
  #     context: ./docker/ffmpeg
  #   container_name: cctv_stream_worker
  #   restart: unless-stopped
  #   volumes:
  #     - ./streams:/streams:rw
  #   networks:
  #     - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata: {}
  # go2rtc_data: {}
