services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: cctv_backend
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cctv_db
      REDIS_URL: redis://redis:6379/0

      JWT_SECRET: supersecretkey
      JWT_ALGORITHM: HS256

      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      # go2rtc internal host (Docker service name) for backend proxy calls
      STREAMING_GO2RTC_HOST: go2rtc
      # go2rtc public URL the browser uses — host machine exposes port 1984
      STREAMING_GO2RTC_PUBLIC_URL: http://localhost:1984

    volumes:
      - ./backend:/app

    depends_on:
      - postgres
      - redis
      - go2rtc

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    image: postgres:15

    container_name: cctv_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cctv_db

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: cctv_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

  go2rtc:
    image: ghcr.io/alexxit/go2rtc:latest
    container_name: cctv_go2rtc
    restart: unless-stopped
    environment:
      - GO2RTC_API=true
      - GO2RTC_DEBUG=false
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml:ro
    ports:
      - "1984:1984" # HTTP API/HLS
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1984/" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:latest
    container_name: cctv_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./streams:/streams:rw
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - go2rtc
    networks:
      - internal

  # Optional legacy ffmpeg worker (disabled in favor of go2rtc)
  # stream-worker:
  #   build:
  #     context: ./docker/ffmpeg
  #   container_name: cctv_stream_worker
  #   restart: unless-stopped
  #   volumes:
  #     - ./streams:/streams:rw
  #   networks:
  #     - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata: {}
  # go2rtc_data: {}